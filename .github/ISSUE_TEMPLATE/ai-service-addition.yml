name: AI Service Addition
description: Request support for a new paid AI service.
title: "[AI Service Addition] "
body:
  - type: markdown
    attributes:
      value: |
        Fill the PM sections with the product requirements for this AI service. Keep implementation details, backend fields, payloads, resource names, and standard app coverage for the Engineering review section.

  - type: textarea
    id: pm_service
    attributes:
      label: "PM 1. 新增 AI 服務"
      description: Basic service identity, reference service, placement, and pricing expectation.
      value: |
        服務名稱：
        Service type：
        pid：
        Reference AI service：
        服務入口：
        服務介紹頁：
        排序：
        價格 / 訂閱 / 免費試用：
    validations:
      required: true

  - type: textarea
    id: pm_settings
    attributes:
      label: "PM 2. 智慧 AI 設定"
      description: Setting page requirements and new user-visible settings.
      value: |
        是否新增智慧 AI 設定頁：
        設定頁排序：
        Reference AI setting：
        新增設定項：
        -

        其他設定：
        特殊 UI：
        -

        Phone / Pad：
    validations:
      required: true

  - type: textarea
    id: pm_event_spec
    attributes:
      label: "PM 3. 事件規格"
      description: Official event ids and display names only.
      value: |
        是否有事件：
        eid：
        -
    validations:
      required: true

  - type: textarea
    id: pm_event_display
    attributes:
      label: "PM 4. 事件顯示"
      description: Event-related surfaces that should show this AI event.
      value: |
        事件列表：
        Timeline：
        事件篩選：
        All Events：
        匯出事件：
        播放器標題：
        推播 channel / name：
    validations:
      required: true

  - type: textarea
    id: pm_push_deeplink
    attributes:
      label: "PM 5. 推播與 Deeplink"
      description: Push image and Android deeplink requirements.
      value: |
        推播圖片：
        Deeplink：
        Deeplink 目的頁：
    validations:
      required: false

  - type: textarea
    id: pm_copy
    attributes:
      label: "PM 6. 文案"
      description: Write one copy item per line so engineering can count required strings clearly.
      value: |
        服務名稱：
        服務說明：
        事件名稱 1：
        事件名稱 2：
        事件名稱 3：
        事件名稱 4：
        設定入口：
        設定項 1：
        設定項 1 說明：
        設定項 1 選項：
        設定項 2：
        設定項 2 選項：

        Translation source:
        APP 多國語系字串整理 / 翻譯更新版本
        https://docs.google.com/spreadsheets/d/1Qvvfxq8q_ysxd9EHl0zZMpqhdAGuxFaun2iWs36sp14/edit?gid=1543369162#gid=1543369162
        https://docs.google.com/spreadsheets/d/1cWyvIt0J4nM6uNXphoOHsmhoVbtsV1S6WhhFU7kxL90/edit?gid=1906643467#gid=1906643467
    validations:
      required: true

  - type: textarea
    id: pm_assets
    attributes:
      label: "PM 7. 素材"
      description: Write one asset purpose per line so engineering can count required images clearly. Do not provide local personal file paths.
      value: |
        Service icon：
        Service banner：
        Setting image：
        Event / Timeline icon 1：
        Event / Timeline icon 2：
        Event / Timeline icon 3：
        Event / Timeline icon 4：
        Push / event image：
        Missing assets：
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        The following sections are for Engineering / Developer review before Codex implementation.

  - type: textarea
    id: engineering_support
    attributes:
      label: "Engineering 1. 支援條件"
      description: Developer-owned support rules derived from backend, product, firmware, and subscription behavior.
      value: |
        後端支援欄位：
        App 是否硬編 SN / FW：
        訂閱 / 免費試用選 camera 篩選：
        設定頁顯示條件：
    validations:
      required: false

  - type: textarea
    id: engineering_api
    attributes:
      label: "Engineering 2. API / Payload"
      description: Developer-owned API and payload details.
      value: |
        服務狀態來源：
        設定讀取來源：
        設定寫入 target：
        設定 payload：
        預設值 fallback：
    validations:
      required: false

  - type: textarea
    id: engineering_implementation
    attributes:
      label: "Engineering 3. 實作推導"
      description: Engineering review outcome before handing the issue to Codex.
      value: |
        Final tier：
        Reference implementation：
        Phone / Pad scope：
        Standard event coverage：
        Resource naming：
        Missing info / blockers：
        Codex execution order：
        Manual QA owner：
    validations:
      required: false

  - type: textarea
    id: codex_prompt
    attributes:
      label: Codex prompt
      description: Complete this after engineering review, then paste it into Codex.
      value: |
        請依照此 GitHub Issue 新增 AI 服務支援。

        請先讀取：
        - AGENTS.md
        - docs/agent-workflows/ai-service-addition-intake.md
        - docs/agent-workflows/ai-service-addition-tiers.md
        - docs/agent-workflows/ai-service-addition-validation.md

        請先做非修改性的盤點，從 PM 填寫區、Engineering review、reference service 與 workflow docs 推導標準改動範圍，並列出本次新需求特有的檔案群、事件鏈路、API 風險、素材與多國語缺口。
        確認範圍後再進行實作。
        實作後執行對應 build、static check 或 manual verification，最後產出變更摘要或 change report。
    validations:
      required: false
