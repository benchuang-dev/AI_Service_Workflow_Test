name: AI Service Addition
description: Request support for a new paid AI service.
title: "[AI Service Addition] "
body:
  - type: markdown
    attributes:
      value: |
        Use this form for the new requirement details that are unique to this AI service.

        PM does not need to list repeated app rules such as default language coverage, standard event-list coverage, standard phone/pad checks, or resource names. Engineering will review the issue and Codex will derive implementation details from the reference service and workflow docs.

  - type: input
    id: service_display_name
    attributes:
      label: Service display name
      description: User-facing service name.
      placeholder: "大型動物偵測 / Large Animal Detection"
    validations:
      required: true

  - type: dropdown
    id: service_type
    attributes:
      label: Service type
      description: Select the closest AI service category.
      options:
        - Video AI
        - Sound AI
        - Mixed AI
        - Account / plan only
        - Unknown
    validations:
      required: true

  - type: textarea
    id: reference_service
    attributes:
      label: Reference AI service
      description: Name the existing AI service to copy, and only mention differences.
      value: |
        Reference service:

        Copy from reference:
        -

        Differences from reference:
        -
    validations:
      required: true

  - type: dropdown
    id: launch_target
    attributes:
      label: Launch target
      description: Where this service is expected to ship first.
      options:
        - staging only
        - prod release
        - POC
        - limited account
        - Unknown
    validations:
      required: true

  - type: textarea
    id: ids_events
    attributes:
      label: Service ID / events
      description: Provide official pid/eid values and event display names. Do not include temporary development-only ids.
      value: |
        pid:

        Event ids and names:
        -

        Replaces a released old eid? Yes / No / Unknown:
        Old eid compatibility required? Yes / No / Not applicable / Unknown:

        Notes:
    validations:
      required: true

  - type: textarea
    id: behavior_settings
    attributes:
      label: New behavior / settings
      description: Describe only new user-visible behavior, settings, and defaults.
      value: |
        What should this AI service do?

        User-visible settings:
        -

        Default values:
        -

        Unknown / blocker:
    validations:
      required: true

  - type: textarea
    id: support_pricing
    attributes:
      label: Support / pricing differences
      description: Fill only differences from the reference service. Use "Same as reference" when unchanged.
      value: |
        Product / account limitation:

        Firmware or account limitation:

        Pricing:

        Free trial:

        Subscription / upgrade behavior:

        Unsupported behavior:

        Notes:
    validations:
      required: true

  - type: textarea
    id: ui_requirements
    attributes:
      label: UI requirements
      description: Describe new screens, placement, custom controls, and special UI requirements.
      value: |
        Service entry / placement:

        Detail page / description page:

        Setting page:

        Custom controls or dialogs:
        -

        Phone / Pad differences:

        Special UI notes:
    validations:
      required: true

  - type: textarea
    id: event_push_deeplink
    attributes:
      label: Event / push / deeplink
      description: Fill only special push or Android deeplink requirements. Event ids and names are already covered above.
      value: |
        Push behavior:

        Deeplink URL:

        Destination page:

        Special notes:
    validations:
      required: false

  - type: textarea
    id: copy_assets
    attributes:
      label: Copy / assets
      description: Provide user-facing copy, required image purposes, and missing items. Do not provide local personal file paths.
      value: |
        User-facing copy:
        -

        Translation source:
        APP 多國語系字串整理 / 翻譯更新版本
        https://docs.google.com/spreadsheets/d/1Qvvfxq8q_ysxd9EHl0zZMpqhdAGuxFaun2iWs36sp14/edit?gid=1543369162#gid=1543369162
        https://docs.google.com/spreadsheets/d/1cWyvIt0J4nM6uNXphoOHsmhoVbtsV1S6WhhFU7kxL90/edit?gid=1906643467#gid=1906643467

        Images needed by purpose:
        - Service icon:
        - Service banner:
        - Setting image:
        - Event / timeline icon:
        - Push/event image:

        Missing copy or assets:

        Notes:
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance and QA
      description: Provide only PM-specific acceptance, unfinished items, and deadlines.
      value: |
        Acceptance screens / flows:
        -

        Acceptable unfinished items:

        Release deadline:
    validations:
      required: true

  - type: textarea
    id: engineering_review
    attributes:
      label: Engineering review
      description: Engineering must complete this before Codex implementation.
      value: |
        Final tier: Service-only / Settings-service / Full-event-service
        Reference implementation:
        Risk level: Low / Medium / High
        Phone/pad required: Phone only / Pad only / Both
        Derived standard coverage:
        Exact API / payload notes:
        Exact resource names:
        Codex execution order:
        Manual QA owner:
        Blockers / missing PM info:
    validations:
      required: false

  - type: textarea
    id: codex_prompt
    attributes:
      label: Codex prompt
      description: Complete this after engineering review, then paste it into Codex.
      value: |
        請依照此 GitHub Issue 新增 AI 服務支援。

        AI 服務：
        - Service name:
        - Service type:
        - Reference service:
        - pid:
        - eid:
        - Tier:

        請先讀取：
        - AGENTS.md
        - docs/agent-workflows/ai-service-addition-intake.md
        - docs/agent-workflows/ai-service-addition-tiers.md
        - docs/agent-workflows/ai-service-addition-validation.md

        請先做非修改性的盤點，從 reference service 與 workflow docs 推導標準改動範圍，並列出本次新需求特有的檔案群、事件鏈路、API 風險、素材與多國語缺口。
        若 issue 只提供使用者視角的後端行為、文字或素材用途，請由工程 review 與程式碼盤點決定實際 endpoint、payload、resource name 與 drawable name。
        確認範圍後再進行實作。
        實作後執行對應 build、static check 或 manual verification，最後產出變更摘要或 change report。
    validations:
      required: false
